<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Resufit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* Cinematic Apple-Style Dark Theme */
            --bg: #000000;
            --bg-alt: #0a0a0c;
            --text: #f5f5f7;
            --text-muted: #86868b;
            --primary: #0071e3;
            --primary-hover: #0077ed;
            --gradient-start: #32c5ff;
            --gradient-mid: #b620e0;
            --gradient-end: #f7b500;

            --card-bg: #111112;
            --card-border: rgba(255, 255, 255, 0.1);

            --font-body: 'Inter', -apple-system, sans-serif;
            --font-heading: 'Outfit', -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Fixed to page, entirely preventing unwanted scrolling */
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            line-height: 1.5;
            overflow: hidden;
            /* Fits to exactly 1 screen */
            -webkit-font-smoothing: antialiased;
        }

        /* Soft ambient glows in background */
        .bg-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .glow-orb {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(50, 197, 255, 0.1) 0%, rgba(182, 32, 224, 0.05) 40%, transparent 70%);
            filter: blur(80px);
        }

        /* Typography */
        h1,
        h2,
        h3,
        h4 {
            font-family: var(--font-heading);
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text);
        }

        .gradient-text {
            background: linear-gradient(100deg, var(--gradient-start) 0%, var(--gradient-mid) 50%, var(--gradient-end) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 24px 48px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Cinematic CSS Scroll Animations */
        @keyframes scrollFadeUpScale {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Auth Wrapper */
        .auth-wrapper {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            position: relative;
        }

        /* Split Auth Card Design */
        .auth-card {
            width: 100%;
            max-width: 900px;
            background: rgba(20, 20, 22, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            box-shadow: 0 40px 100px -20px rgba(50, 197, 255, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            animation: scrollFadeUpScale 1s cubic-bezier(0.16, 1, 0.3, 1) ease-out;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            /* Fits the split perfectly */
        }

        /* Left Side: Form */
        .auth-left {
            flex: 1.5;
            padding: 48px;
        }

        .auth-header {
            margin-bottom: 40px;
        }

        .auth-header h2 {
            font-size: 2.25rem;
            margin-bottom: 4px;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
            font-family: var(--font-heading);
        }

        .forgot-pass {
            font-size: 0.85rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-pass:hover {
            text-decoration: underline;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--card-border);
            color: var(--text);
            padding: 14px 16px;
            border-radius: 12px;
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.25);
            background: rgba(0, 0, 0, 0.8);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* Right Side: Alternative Sign In */
        .auth-right {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border-left: 1px solid var(--card-border);
            padding: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .auth-right h3 {
            font-size: 1.25rem;
            margin-bottom: 24px;
        }

        /* Buttons */
        .btn {
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
            gap: 12px;
        }

        .btn-blue {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            margin-top: 8px;
        }

        .btn-blue:hover {
            background: var(--primary-hover);
            box-shadow: 0 0 20px rgba(0, 113, 227, 0.4);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border-color: var(--card-border);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .btn-outline svg {
            width: 20px;
            height: 20px;
        }

        .auth-footer {
            margin-top: auto;
            padding-top: 40px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-card {
                flex-direction: column;
                max-width: 440px;
            }

            .auth-right {
                border-left: none;
                border-top: 1px solid var(--card-border);
                padding: 32px 48px;
            }
        }
    </style>
</head>

<body>

    <!-- Background Ambient Glow -->
    <div class="bg-glow">
        <div class="glow-orb"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="/" class="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            Resufit
        </a>
    </nav>

    <!-- Auth Card (Horizontal Split) -->
    <div class="auth-wrapper">
        <div class="auth-card">

            <!-- Left Side (Login Form) -->
            <div class="auth-left">
                <div class="auth-header">
                    <h2>Welcome back.</h2>
                    <p>Log in to access your <span class="gradient-text">dashboard.</span></p>
                </div>

                {% if error %}
                <div style="
                    background: rgba(255,59,48,0.1);
                    color: #ff3b30;
                    padding: 12px;
                    border-radius: 10px;
                    margin-bottom: 20px;
                    font-weight: 500;
                ">
                    {{ error }}
                </div>
                {% endif %}



                <form action="{{ url_for('login') }}" method="POST">
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com"
                            required>
                    </div>

                    <div class="form-group">
                        <div style="display: flex; justify-content: space-between; align-items: baseline;">
                            <label for="password">Password</label>
                            <a href="/forgot_password" class="forgot-pass">Forgot password?</a>
                        </div>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                            required>
                    </div>

                    <button type="submit" class="btn btn-blue" style="margin-top: 24px;">Sign In</button>
                </form>
            </div>

            <!-- Right Side (Alternative Login / Sign Up Link) -->
            <div class="auth-right">
                <h3 style="margin-top: 120px;margin-left: 60px;">Alternative Sign In</h3>
                <button type="button" class="btn btn-outline" onclick="window.location.href='/google/login'">
                    <!-- Google SVG Icon -->
                    <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Continue with Google
                </button>

                <p class="auth-footer">Don't have an account?<br><a href="/register">Sign Up Instead</a></p>
            </div>

        </div>
    </div>



</body>

</html>
